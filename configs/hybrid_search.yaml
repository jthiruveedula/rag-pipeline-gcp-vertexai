# Hybrid search RAG experiment configuration
experiment_name: hybrid_search
description: "Hybrid dense+sparse BM25 retrieval with cross-encoder reranking"

chunking:
  strategy: fixed
  chunk_size: 512
  overlap: 64

retrieval:
  method: hybrid
  top_k: 10
  distance: cosine
  embedding_model: text-embedding-004
  sparse_weight: 0.3
  dense_weight: 0.7

reranker:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_n: 5

generation:
  model: gemini-1.5-flash-001
  temperature: 0.0
  max_tokens: 1024

eval:
  dataset_path: data/eval/golden_set.jsonl
  metrics:
    - faithfulness
    - answer_relevancy
    - context_recall
  faithfulness_threshold: 0.85
  p95_latency_threshold_ms: 1200

gcp:
  project_id: ${GCP_PROJECT_ID}
  bq_dataset: rag_eval
  bq_table: experiment_results
  gcs_bucket: ${GCS_SCORECARD_BUCKET}
  location: us-central1

